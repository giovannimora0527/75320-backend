# ================================================
# CONFIGURACI\u00d3N DE SEGURIDAD - CONTROL DE LOGIN
# ================================================
# N\u00famero m\u00e1ximo de intentos fallidos antes de bloquear cuenta
security.login.max-intentos=3

# Tiempo de bloqueo en minutos despu\u00e9s de superar intentos m\u00e1ximos
security.login.tiempo-bloqueo-minutos=5

# Ventana de tiempo para contar intentos fallidos (en minutos)
security.login.ventana-intentos-minutos=15

# ================================================
# CONFIGURACI\u00d3N DE LOGGING (AUDITOR\u00cdA)
# ================================================
# Nivel de logs general
logging.level.root=INFO

# Nivel de logs para el paquete de la aplicaci\u00f3n
logging.level.com.uniminuto.clinica=DEBUG

# Nivel espec\u00edfico para el servicio de autenticaci\u00f3n
logging.level.com.uniminuto.clinica.service.impl.AutenticarServiceImpl=DEBUG

# Archivo de logs
logging.file.name=logs/clinica-app.log

# Patr\u00f3n de logs en consola
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Patr\u00f3n de logs en archivo
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ================================================
# CONFIGURACI\u00d3N DE SWAGGER/OPENAPI
# ================================================
# Habilitar Swagger UI
springdoc.swagger-ui.enabled=true
# Ruta personalizada para Swagger UI
springdoc.swagger-ui.path=/swagger-ui/index.html
# Ordenar endpoints alfab\u00e9ticamente
springdoc.swagger-ui.operationsSorter=alpha
# Ordenar tags alfab\u00e9ticamente
springdoc.swagger-ui.tagsSorter=alpha
# Mostrar el modelo de solicitud por defecto
springdoc.swagger-ui.defaultModelsExpandDepth=1
# Ruta de la documentaci\u00f3n de la API
springdoc.api-docs.path=/api-docs
# Habilitar la documentaci\u00f3n de la API
springdoc.api-docs.enabled=true
# Paquetes a escanear para la documentaci\u00f3n
springdoc.packages-to-scan=com.uniminuto.clinica
# Rutas a incluir
springdoc.paths-to-match=/**