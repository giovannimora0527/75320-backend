spring.application.name=clinica

server.port=8000
server.tomcat.max-threads=32
server.servlet.contextPath=/clinica/v1


# Configuración de conexión a MySQL
# Para desarrollo local: localhost:3306
# Para Docker: mysql:3306 (se sobrescribe con variables de entorno)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/clinica}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:lozada11nahomi24*}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate (ORM)
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=false
spring.jpa.open-in-view=false
logging.level.org.springframework.boot.autoconfigure=ERROR
logging.level.com.zaxxer.hikari=DEBUG

# Configuración de pool de conexiones Hikari (opcional, mejora el rendimiento)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.max-lifetime=1800000

# Configuración JWT
jwt.secret=QWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMw==
# 1 hora en milisegundos
jwt.expiration=86400000

# Configuración de correo electrónico (Spring Mail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=programacionwebuniminuto1@gmail.com
spring.mail.password=dnvpizhczylrmydk
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.to=programacionwebuniminuto1@gmail.com

# Configuración de seguridad - Control de intentos de login
# Tiempo de bloqueo en minutos después de intentos fallidos
security.login.block.duration.minutes=5
# Número máximo de intentos fallidos antes del bloqueo
security.login.max.failed.attempts=3

# Configuración de Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
